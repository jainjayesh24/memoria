# fly.toml — generated for Memoria
# Replace "memoria-yourname" with your own unique app name

app = "memoria-yourname"
primary_region = "sin"          # Singapore — closest free region to India

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "8080"
  DB_PATH  = "/data/memoria.db"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true    # sleeps when idle → stays in free tier
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source      = "memoria_data"
  destination = "/data"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
